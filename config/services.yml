services:
    _defaults:
        autowire: true
        autoconfigure: true

    Heimseiten\ContaoCustomBackendSettingsBundle\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/Compiler/'

    # Replacement for Contao's article-on-page-create callback; needs the core listener it wraps.
    Heimseiten\ContaoCustomBackendSettingsBundle\EventListener\PreventArticleGenerationListener:
        arguments:
            $contentComposition: '@contao.listener.data_container.content_composition'
